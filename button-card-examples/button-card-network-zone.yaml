type: vertical-stack
cards:
  - type: horizontal-stack
    cards:
      - type: custom:button-card
        color_type: blank-card
      - type: custom:button-card
        entity: sensor.synology_cpu_utilization_total
        icon: mdi:cpu-64-bit
        name: CPU
        show_name: false
        label: >
          [[[ return '' + states['sensor.synology_cpu_utilization_total'].state +
          '%'; ]]]
        show_label: true
        tap_action:
          action: more-info
          target:
            entity_id: sensor.synology_cpu_utilization_total
        styles:
          card:
            - "--mdc-ripple-color": lime
            - "--mdc-ripple-press-opacity": 0.5
            - background-color: black
            - padding: 0%
            - color: white
            - font-size: 11px
            - font-weight: bold
            - text-transform: capitalize
          img_cell:
            - justify-content: start
            - align-items: start
            - margin: none
          icon:
            - color: |
                [[[
                    if (entity.state > 0.0 && entity.state < 15.0) return 'mediumseagreen';
                    if (entity.state >= 15.0 && entity.state < 25.0) return 'yellow';
                    if (entity.state >= 25.0 && entity.state < 35.0) return 'orange';
                    else return 'red';
                ]]]
            - width: 30%
            - margin-top: 0%
      - type: custom:button-card
        color_type: label-card
        color: black
        label: NAS
        show_label: true
      - type: custom:button-card
        entity: sensor.synology_memory_usage_real
        icon: mdi:memory
        name: RAM
        show_name: false
        label: >
          [[[ return '' + states['sensor.synology_memory_usage_real'].state + '%';
          ]]]
        show_label: true
        tap_action:
          action: more-info
          target:
            entity_id: sensor.synology_memory_usage_real
        styles:
          card:
            - "--mdc-ripple-color": lime
            - "--mdc-ripple-press-opacity": 0.5
            - background-color: black
            - padding: 0%
            - color: white
            - font-size: 11px
            - font-weight: bold
            - text-transform: capitalize
          img_cell:
            - justify-content: start
            - align-items: start
            - margin: none
          icon:
            - color: |
                [[[
                    if (entity.state > 0.0 && entity.state < 45.0) return 'mediumseagreen';
                    if (entity.state >= 45.0 && entity.state < 50.0) return 'yellow';
                    if (entity.state >= 50.0 && entity.state < 65.0) return 'orange';
                    else return 'red';
                ]]]
            - width: 30%
            - margin-top: 0%
      - type: custom:button-card
        color_type: blank-card
  - type: horizontal-stack
    cards:
