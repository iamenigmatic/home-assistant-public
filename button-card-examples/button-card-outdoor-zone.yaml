type: vertical-stack
cards:
  - type: horizontal-stack
    cards:
      - type: custom:button-card
        entity: switch.home_water_valve_shutoff_valve
        icon: |
          [[[
            if (entity.state == 'on') return 'mdi:valve-open';
                  
            else return 'mdi:valve-closed';
          ]]]
        name: Home Water
        show_name: true
        tap_action:
          action: more-info
          target:
            entity_id: switch.home_water_valve_shutoff_valve
        styles:
          card:
            - "--mdc-ripple-color": lime
            - "--mdc-ripple-press-opacity": 0.5
            - background-color: |
                [[[
                  if (entity.state == 'on') return 'lightblue';
                  
                  else return 'red';
                ]]]
            - padding: 0%
            - color: |
                [[[
                  if (entity.state == 'on') return 'black';

                  else return 'white';
                ]]]
            - font-size: 11px
            - font-weight: bold
            - text-transform: capitalize
          img_cell:
            - justify-content: start
            - align-items: start
            - margin: none
          icon:
            - color: |
                [[[
                  if (entity.state == 'on') return 'black';

                  else return 'lightblue';
                ]]]
            - width: 30%
            - margin-top: 0%
      - type: custom:button-card
        entity: binary_sensor.home_water_valve_pending_system_alerts
        icon: |
          [[[
            if (entity.state == 'off') return 'mdi:check-circle';
                  
            else return 'mdi:alert-circle';
          ]]]
        name: Status
        show_name: false
        label: >
          [[[ return 'Alerts: ' +
          states['binary_sensor.home_water_valve_pending_system_alerts'].state;
          ]]]
        show_label: true
        tap_action:
          action: more-info
          target:
            entity_id: binary_sensor.home_water_valve_pending_system_alerts
        styles:
          card:
            - "--mdc-ripple-color": lime
            - "--mdc-ripple-press-opacity": 0.5
            - background-color: |
                [[[
                  if (entity.state == 'off') return 'mediumseagreen';
                  
                  else return 'red';
                ]]]
            - padding: 0%
            - color: |
                [[[
                  if (entity.state == 'off') return 'black';

                  else return 'white';
                ]]]
            - font-size: 11px
            - font-weight: bold
            - text-transform: capitalize
          img_cell:
            - justify-content: start
            - align-items: start
            - margin: none
          icon:
            - color: |
                [[[
                  if (entity.state == 'off') return 'black';

                  else return 'yellow';
                ]]]
            - width: 30%
            - margin-top: 0%
      - type: custom:button-card
        entity: sensor.home_water_valve_current_system_mode
        icon: |
          [[[
            if (entity.state == 'home') return 'mdi:eye';
            if (entity.state == 'sleep') return 'mdi:sleep';
                  
            else return 'mdi:eye-closed';
          ]]]
        name: Status
        show_name: false
        label: >
          [[[ return '' +
          states['sensor.home_water_valve_current_system_mode'].state; ]]]
        show_label: true
        tap_action:
          action: more-info
          target:
            entity_id: sensor.home_water_valve_current_system_mode
        styles:
          card:
            - "--mdc-ripple-color": lime
            - "--mdc-ripple-press-opacity": 0.5
            - background-color: |
                [[[
                  if (entity.state == 'home') return 'mediumseagreen';
                  if (entity.state == 'sleep') return 'dimgrey';
                  
                  else return 'red';
                ]]]
            - padding: 0%
            - color: |
                [[[
                  if (entity.state == 'home') return 'black';
                  if (entity.state == 'sleep') return 'black';

                  else return 'white';
                ]]]
            - font-size: 11px
            - font-weight: bold
            - text-transform: capitalize
          img_cell:
            - justify-content: start
            - align-items: start
            - margin: none
          icon:
            - color: |
                [[[
                  if (entity.state == 'home') return 'black';
                  if (entity.state == 'sleep') return 'black';

                  else return 'yellow';
                ]]]
            - width: 30%
            - margin-top: 0%
      - type: custom:button-card
        color_type: blank-card
      - type: custom:button-card
        color_type: blank-card
      - type: custom:button-card
        entity: switch.water_valve_switch
