  - type: horizontal-stack
    cards:
      - type: custom:button-card
        color_type: blank-card
      - type: custom:button-card
        entity: sensor.home_water_valve_water_temperature
        icon: mdi:water-thermometer-outline
        name: Status
        show_name: false
        label: >
          [[[ return '' +
          states['sensor.home_water_valve_water_temperature'].state + '° F'; ]]]
        show_label: true
        tap_action:
          action: more-info
          target:
            entity_id: sensor.home_water_valve_water_temperature
        styles:
          card:
            - "--mdc-ripple-color": lime
            - "--mdc-ripple-press-opacity": 0.5
            - background-color: black
            - padding: 0%
            - color: white
            - font-size: 11px
            - font-weight: bold
            - text-transform: capitalize
          img_cell:
            - justify-content: start
            - align-items: start
            - margin: none
          icon:
            - color: |
                [[[
                    if (entity.state > 20.0 && entity.state < 38.0) return 'red';
                    if (entity.state >= 38.0 && entity.state < 45.0) return 'orange';
                    if (entity.state >= 45.0 && entity.state < 55.0) return 'yellow';
                    else return 'mediumseagreen';
                ]]]
            - width: 30%
            - margin-top: 0%
      - type: custom:button-card
        entity: sensor.home_water_valve_water_flow_rate
        icon: mdi:water-pump
        name: Status
        show_name: false
        label: >
          [[[ return '' + states['sensor.home_water_valve_water_flow_rate'].state
          + ' g/m'; ]]]
        show_label: true
        tap_action:
          action: more-info
          target:
            entity_id: sensor.home_water_valve_water_flow_rate
        styles:
          card:
            - "--mdc-ripple-color": lime
            - "--mdc-ripple-press-opacity": 0.5
            - background-color: black
            - padding: 0%
            - color: white
            - font-size: 11px
            - font-weight: bold
            - text-transform: null
          img_cell:
            - justify-content: start
            - align-items: start
            - margin: none
          icon:
            - color: |
                [[[
                    if (entity.state > 0.1 && entity.state < 1.5) return 'yellow';
                    if (entity.state >= 1.5 && entity.state < 2.0) return 'orange';
                    if (entity.state >= 2.0 && entity.state < 20.0) return 'red';
                    else return 'mediumseagreen';
                ]]]
            - width: 30%
            - margin-top: 0%
      - type: custom:button-card
        entity: sensor.home_water_valve_water_pressure
        icon: |
          [[[
              if (entity.state > 0.0 && entity.state < 40) return 'mdi:gauge-empty';
              if (entity.state >= 40.0 && entity.state < 50.0) return 'mdi:gauge-low';
              if (entity.state >= 50.0 && entity.state < 60.0) return 'mdi:gauge';
              else return 'mdi:gauge-full';
          ]]]
        name: Status
        show_name: false
        label: >
          [[[ return '' + states['sensor.home_water_valve_water_pressure'].state
          + ' psi'; ]]]
        show_label: true
        tap_action:
          action: more-info
          target:
            entity_id: sensor.home_water_valve_water_pressure
        styles:
          card:
            - "--mdc-ripple-color": lime
            - "--mdc-ripple-press-opacity": 0.5
            - background-color: black
            - padding: 0%
            - color: white
            - font-size: 11px
            - font-weight: bold
            - text-transform: null
          img_cell:
            - justify-content: start
            - align-items: start
            - margin: none
          icon:
            - color: |
                [[[
                    if (entity.state >= 0.0 && entity.state < 40.0) return 'red';
                    if (entity.state >= 40.0 && entity.state < 50.0) return 'orange';
                    if (entity.state >= 50.0 && entity.state < 60.0) return 'yellow';
                    if (entity.state >75.0) return 'red';
                    else return 'mediumseagreen';
                ]]]
            - width: 30%
            - margin-top: 0%
      - type: custom:button-card
        entity: sensor.home_water_valve_today_s_water_usage
