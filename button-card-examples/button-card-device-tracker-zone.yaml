          icon:
            - color: |
                [[[
                  if (states['person.person2'].state == 'home') return 'mediumseagreen';

                  else return 'black';
                ]]]
            - width: 60px
            - margin-top: 0%
      - type: vertical-stack
        cards:
          - type: custom:button-card
            entity: sensor.phone2_battery_level
