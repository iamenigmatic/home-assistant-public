type: vertical-stack
cards:
  - type: heading
    icon: ""
    heading_style: title
  - type: heading
    icon: ""
    heading: Bedroom
    heading_style: title
    tap_action:
      action: perform-action
      perform_action: input_boolean.toggle
      target:
        entity_id: input_boolean.toggle_minimal_bedmain
    badges:
      - type: entity
        show_state: true
        show_icon: true
        entity: sensor.thermbedroom_temperature
        tap_action:
          action: more-info
      - type: entity
        show_state: true
        show_icon: true
        entity: sensor.thermbedroom_humidity
        tap_action:
          action: more-info
      - type: entity
        show_state: false
        show_icon: true
        entity: sensor.thermbedroom_battery
        color: red
        tap_action:
          action: more-info
        visibility:
          - condition: numeric_state
            entity: sensor.thermbedroom_battery
            below: 12