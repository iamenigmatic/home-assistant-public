type: vertical-stack
cards:
  - type: heading
    icon: ""
    heading_style: title
  - type: vertical-stack
    cards:
      - type: heading
        icon: ""
        heading: Laundry
        heading_style: title
        badges:
          - type: entity
            show_state: false
            show_icon: true
            entity: timer.washer
            tap_action:
              action: perform-action
              perform_action: timer.start
              target:
                entity_id: timer.washer
            name: Washer Timer
          - type: entity
            show_state: false
            show_icon: true
            entity: timer.dryer
            tap_action:
              action: perform-action
              perform_action: timer.start
              target:
                entity_id: timer.dryer
            name: Dryer Timer
          - type: entity
            show_state: true
            show_icon: true
            entity: sensor.water_detector_washer_temperature
            tap_action:
              action: more-info
          - type: entity
            show_state: true
            show_icon: true
            entity: sensor.water_detector_washer_humidity
            tap_action:
              action: more-info
          - type: entity
            show_state: false
            show_icon: true
            entity: sensor.water_detector_washer_battery
            tap_action:
              action: more-info
            visibility:
              - condition: numeric_state
                entity: sensor.water_detector_washer_battery
                below: 10
            color: red
          - type: entity
            show_state: true
            show_icon: true
            entity: binary_sensor.water_detector_washer_water_detected
            color: red
            visibility:
              - condition: state
                entity: binary_sensor.water_detector_washer_water_detected
                state_not: "off"
            tap_action:
              action: more-info
        tap_action:
          action: perform-action
          perform_action: input_boolean.toggle
          target:
            entity_id: input_boolean.toggle_minimal_laundry