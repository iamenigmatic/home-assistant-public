type: vertical-stack
cards:
  - type: heading
    icon: ""
    heading_style: title
  - type: heading
    icon: ""
    heading_style: title
    heading: Bedroom (S)
    tap_action:
      action: perform-action
      perform_action: input_boolean.toggle
      target:
        entity_id: input_boolean.toggle_minimal_bedspare
    badges:
      - type: entity
        show_state: false
        show_icon: true
        entity: binary_sensor.window_bed_spare_1_intrusion
        icon: mdi:window-closed
        color: red
        visibility:
          - condition: state
            entity: binary_sensor.window_bed_spare_1_intrusion
            state_not: "off"
      - type: entity
        show_state: false
        show_icon: true
        entity: binary_sensor.window_bed_spare_2_intrusion
        icon: mdi:window-closed
        visibility:
          - condition: state
            entity: binary_sensor.window_bed_spare_2_intrusion
            state_not: "off"
      - type: entity
        show_state: false
        show_icon: true
        entity: device_tracker.alien
        visibility:
          - condition: state
            entity: device_tracker.alien
            state: home
        color: green
        icon: mdi:alien
      - type: entity
        show_state: true
        show_icon: true
        entity: sensor.thermbedspare_temperature
        tap_action:
          action: more-info
      - type: entity
        show_state: true
        show_icon: true
        entity: sensor.thermbedspare_humidity
        tap_action:
          action: more-info
      - type: entity
        show_state: false
        show_icon: true
        entity: sensor.thermbedspare_battery
        color: red
        tap_action:
          action: more-info
        visibility:
          - condition: numeric_state
            entity: sensor.thermbedspare_battery
            below: 12