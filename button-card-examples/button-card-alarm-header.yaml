type: vertical-stack
cards:
  - type: heading
    icon: ""
    heading_style: title
  - type: heading
    icon: ""
    heading: Alarm
    heading_style: title
    badges:
      - type: entity
        show_state: true
        show_icon: true
        entity: alarm_control_panel.alarmo
        name: Alarm State
        color: green
        tap_action:
          action: more-info
      - type: entity
        show_state: true
        show_icon: true
        entity: number.camera1_volume_5
        name: Alarm Volume
    tap_action:
      action: perform-action
      perform_action: input_boolean.toggle
      target:
        entity_id: input_boolean.toggle_minimal_alarm