type: vertical-stack
cards:
  - type: horizontal-stack
    cards:
      - type: custom:button-card
        color_type: blank-card
      - type: custom:button-card
        entity: binary_sensor.connected_internet
        name: Wi-Fi
        show_name: false
        tap_action:
          action: more-info
          target:
            entity_id: binary_sensor.connected_internet
        styles:
          card:
            - "--mdc-ripple-color": lime
            - "--mdc-ripple-press-opacity": 0.5
            - background-color: |
                [[[
                  if (entity.state == 'off') return 'mediumseagreen';
                  
                  else return 'red';
                ]]]
            - padding: 0%
            - color: |
                [[[
                  if (entity.state == 'off') return 'black';

                  else return 'black';
                ]]]
            - font-size: 11px
            - font-weight: bold
            - text-transform: capitalize
            - border-radius: 50%
            - height: 35px
            - width: 35px
          img_cell:
            - justify-content: start
            - align-items: start
            - margin: none
          icon:
            - color: |
                [[[
                  if (entity.state == 'off') return 'black';

                  else return 'black';
                ]]]
            - width: 35px
            - margin-top: 0%
