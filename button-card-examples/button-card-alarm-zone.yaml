type: vertical-stack
cards:
  - type: horizontal-stack
    cards:
      - type: heading
        icon: ""
        heading: Nest LR
        heading_style: subtitle
      - type: custom:button-card
        entity: binary_sensor.nest_protect_living_room_smoke_status
        icon: |
          [[[
            if (entity.state == 'off') return 'mdi:smoking';
                  
            else return 'mdi:smoke';
          ]]]
        name: Status
        show_name: false
        label: |
          [[[
            if (entity.state == 'off') return 'Clear';

            else return 'SMOKE';
          ]]]
        show_label: true
        tap_action:
          action: more-info
          target:
            entity_id: binary_sensor.nest_protect_living_room_smoke_status
        styles:
          card:
            - "--mdc-ripple-color": lime
            - "--mdc-ripple-press-opacity": 0.5
            - animation: |
                [[[
                  if (entity.state == 'on') return 'blink 2s ease infinite';
                ]]]
            - background-color: |
                [[[
                  if (entity.state == 'off') return 'black';
                  
                  else return 'red';
                ]]]
            - padding: 0%
            - color: |
                [[[
                  if (entity.state == 'off') return 'white';

                  else return 'black';
                ]]]
            - font-size: 11px
            - font-weight: bold
            - text-transform: capitalize
          img_cell:
            - justify-content: start
            - align-items: start
            - margin: none
          icon:
            - color: |
                [[[
                  if (entity.state == 'off') return 'mediumseagreen';

                  else return 'yellow';
                ]]]
            - width: 30%
            - margin-top: 0%
      - type: custom:button-card
        entity: binary_sensor.nest_protect_living_room_co_status
        icon: mdi:molecule-co
        name: Status
        show_name: false
