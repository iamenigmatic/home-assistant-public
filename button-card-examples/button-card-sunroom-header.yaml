type: vertical-stack
cards:
  - type: heading
    icon: ""
    heading_style: title
  - type: heading
    icon: ""
    heading_style: title
    heading: Sunroom
    badges:
      - type: entity
        show_state: false
        show_icon: true
        entity: binary_sensor.door_front_window_door_is_open
        color: red
        tap_action:
          action: none
        icon: mdi:door
        visibility:
          - condition: state
            entity: binary_sensor.door_front_window_door_is_open
            state_not: "off"
      - type: entity
        show_state: false
        show_icon: true
        entity: binary_sensor.window_sunroom_1_intrusion
        color: red
        tap_action:
          action: none
        visibility:
          - condition: state
            entity: binary_sensor.window_sunroom_1_intrusion
            state_not: "off"
        icon: mdi:window-closed
      - type: entity
        show_state: false
        show_icon: true
        entity: binary_sensor.motion_sunroom_occupancy
        color: red
        icon: mdi:motion-sensor
        visibility:
          - condition: state
            entity: binary_sensor.motion_sunroom_occupancy
            state_not: "off"
      - type: entity
        show_state: false
        show_icon: true
        entity: vacuum.davaq
        color: green
        visibility:
          - condition: state
            entity: vacuum.davaq
            state_not: docked
      - type: entity
        show_state: false
        show_icon: true
        entity: switch.dehumidsunroom
        color: green
        icon: mdi:air-filter
        visibility:
          - condition: state
            entity: switch.dehumidsunroom
            state: "on"
      - type: entity
        show_state: false
        show_icon: true
        entity: switch.dining_light
        icon: mdi:ceiling-light-multiple
        color: accent
        visibility:
          - condition: state
            entity: switch.dining_light
            state: "on"
      - type: entity
        show_state: true
        show_icon: true
        entity: sensor.thermsunroom_temperature
        tap_action:
          action: more-info
      - type: entity
        show_state: true
        show_icon: true
        entity: sensor.thermsunroom_humidity
        tap_action:
          action: more-info
      - type: entity
        show_state: false
        show_icon: true
        entity: sensor.thermsunroom_battery
        color: red
        tap_action:
          action: more-info
        visibility:
          - condition: numeric_state
            entity: sensor.thermsunroom_battery
            below: 12
      - type: entity
        show_state: false
        show_icon: true
        entity: sensor.motion_sunroom_battery
        color: red
        tap_action:
          action: more-info
        visibility:
          - condition: numeric_state
            entity: sensor.sonoff__battery
            below: 12
    tap_action:
      action: perform-action
      perform_action: input_boolean.toggle
      target:
        entity_id: input_boolean.toggle_minimal_sunroom