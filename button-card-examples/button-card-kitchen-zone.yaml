type: vertical-stack
cards:
  - type: horizontal-stack
    cards:
      - type: custom:button-card
        entity: light.lightskitchen
        icon: mdi:lightbulb-group
        name: Kitchen
        show_name: true
        tap_action:
          action: more-info
          target:
            entity_id: light.lightskitchen
        styles:
          card:
            - "--mdc-ripple-color": lime
            - "--mdc-ripple-press-opacity": 0.5
            - background-color: |
                [[[
                  if (entity.state == 'on') return 'var(--button-card-light-color)';
                  
                  else return 'black';
                ]]]
            - padding: 0%
            - color: |
                [[[
                  if (entity.state == 'on') return 'black';

                  else return 'white';
                ]]]
            - font-size: 11px
            - font-weight: bold
            - text-transform: capitalize
          img_cell:
            - justify-content: start
            - align-items: start
            - margin: none
          icon:
            - color: |
                [[[
                  if (entity.state == 'on') return 'black';

                  else return 'darkgoldenrod';
                ]]]
            - width: 30%
            - margin-top: 0%
      - type: custom:button-card
        color_type: blank-card
      - type: custom:button-card
        entity: light.lightkitchen1
        icon: mdi:lightbulb
        name: Kitch 1
        show_name: true
