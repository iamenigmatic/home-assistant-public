type: vertical-stack
cards:
  - type: heading
    icon: ""
    heading_style: title
  - type: heading
    icon: ""
    heading: Living Room
    heading_style: title
    badges:
      - type: entity
        show_state: false
        show_icon: true
        entity: binary_sensor.door_back_intrusion
        color: red
        tap_action:
          action: none
        icon: mdi:door
        visibility:
          - condition: state
            entity: binary_sensor.door_back_intrusion
            state_not: "off"
      - type: entity
        show_state: false
        show_icon: true
        entity: sensor.wall_remote_living_battery_level
        color: red
        icon: mdi:remote
        visibility:
          - condition: numeric_state
            entity: sensor.wall_remote_living_battery_level
            below: 20
      - type: entity
        show_state: true
        show_icon: true
        entity: media_player.rx_v479
        tap_action:
          action: perform-action
          perform_action: media_player.select_source
          target:
            entity_id: media_player.rx_v479
          data:
            source: HDMI6
        name: ROKU
        color: red
        state_content: name
        visibility:
          - condition: state
            entity: media_player.rx_v479
            state_not: playing
          - condition: and
            conditions:
              - condition: state
                entity: media_player.rx_v479
                state_not: "off"
      - type: entity
        show_state: false
        show_icon: true
        entity: light.living_room_lights
        color: accent
        visibility:
          - condition: state
            entity: light.living_room_lights
            state: "on"
      - type: entity
        show_state: false
        show_icon: true
        entity: binary_sensor.gt_ax11000_internet
        icon: mdi:ip-outline
        color: green
        tap_action:
          action: more-info
      - type: entity
        show_state: true
        show_icon: true
        entity: sensor.breathesmart_45i_pm2_5
        color: blue-grey
    tap_action:
      action: perform-action
      perform_action: input_boolean.toggle
      target:
        entity_id: input_boolean.toggle_minimal_livingroom