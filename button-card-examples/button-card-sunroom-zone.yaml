type: vertical-stack
cards:
  - type: horizontal-stack
    cards:
      - type: custom:button-card
        entity: switch.dining_light
        icon: mdi:ceiling-light-multiple
        name: Dining
        show_name: true
        tap_action:
          action: perform-action
          perform_action: switch.toggle
          target:
            entity_id: switch.dining_light
        styles:
          card:
            - "--mdc-ripple-color": lime
            - "--mdc-ripple-press-opacity": 0.5
            - background-color: |
                [[[
                  if (entity.state == 'on') return 'darkgoldenrod';
                  if (entity.state == 'off') return 'black';
                  
                  else return 'white';
                ]]]
            - padding: 0%
            - color: |
                [[[
                  if (entity.state == 'on') return 'black';

                  else return 'white';
                ]]]
            - font-size: 11px
            - font-weight: bold
            - text-transform: capitalize
          img_cell:
            - justify-content: start
            - align-items: start
            - margin: none
          icon:
            - color: |
                [[[
                  if (entity.state == 'on') return 'black';
                  if (entity.state == 'off') return 'darkgoldenrod';

                  else return 'white';
                ]]]
            - width: 30%
            - margin-top: 0%
      - type: custom:button-card
        color_type: blank-card
      - type: custom:button-card
        entity: switch.indoor_lights
        icon: mdi:string-lights
        name: String
        show_name: true
        tap_action:
          action: perform-action
          perform_action: switch.toggle
