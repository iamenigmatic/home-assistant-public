type: vertical-stack
cards:
  - type: heading
    icon: ""
    heading_style: title
  - type: heading
    icon: ""
    heading: Kitchen
    heading_style: title
    tap_action:
      action: perform-action
      perform_action: input_boolean.toggle
      target:
        entity_id: input_boolean.toggle_minimal_kitchen
    badges:
      - type: entity
        show_state: false
        show_icon: true
        entity: binary_sensor.motion_kitchen_occupancy
        icon: mdi:motion-sensor
        color: red
        visibility:
          - condition: state
            entity: binary_sensor.motion_kitchen_occupancy
            state_not: "off"
      - type: entity
        show_state: false
        show_icon: true
        entity: binary_sensor.motion_kitchen_2_occupancy
        visibility:
          - condition: state
            entity: binary_sensor.motion_kitchen_2_occupancy
            state_not: "off"
        icon: mdi:motion-sensor
        color: red
      - type: entity
        show_state: false
        show_icon: true
        entity: light.lightskitchen
        color: state
        visibility:
          - condition: state
            entity: light.lightskitchen
            state: "on"