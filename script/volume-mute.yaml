# Harmony Hub script to mute volume

sequence:
  - action: remote.send_command
    target:
      entity_id: remote.harmony_hub
    data:
      num_repeats: 1
      delay_secs: 0.4
      hold_secs: 0
      command:
        - Mute
      device: Yamaha Av Receiver
alias: Volume Mute
description: ""
