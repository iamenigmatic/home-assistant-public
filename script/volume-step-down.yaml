# Harmony Hub script to turn down the volume 3 steps per press

sequence:
  - action: remote.send_command
    target:
      entity_id: remote.harmony_hub
    data:
      num_repeats: 3
      delay_secs: 0.4
      hold_secs: 0
      command:
        - VolumeDown
      device: Yamaha Av Receiver
alias: Volume Step Down
description: ""
