# Harmony Hub script to turn on and off tv, stereo, and hit home on roku

alias: Turn Off Tv
sequence:
  - action: remote.send_command
    data:
      num_repeats: 1
      delay_secs: 0.4
      hold_secs: 0
      command:
        - Home
      device: Roku Ultra
    target:
      entity_id: remote.harmony_hub
  - action: remote.send_command
    data:
      num_repeats: 1
      delay_secs: 0.4
      hold_secs: 0
      command:
        - PowerToggle
      device: Sharp TV
    target:
      entity_id: remote.harmony_hub
  - action: remote.send_command
    data:
      num_repeats: 1
      delay_secs: 0.4
      hold_secs: 0
      command:
        - PowerToggle
      device: Yamaha AV Receiver
    target:
      entity_id: remote.harmony_hub
description: ""
icon: mdi:television
